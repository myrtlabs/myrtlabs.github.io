<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myrt Labs — AI Agent Studio</title>
    <meta name="description" content="Myrt Labs builds intelligent AI agents that reason, plan, and act autonomously.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap');

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #faf9f0;
            --bg-nav: rgba(250, 249, 240, 0.85);
            --surface: #f0efe6;
            --surface-hover: #e8e7de;
            --accent: #d97757;
            --accent-hover: #c4684b;
            --accent-subtle: rgba(217, 119, 87, 0.08);
            --accent-border: rgba(217, 119, 87, 0.2);
            --text: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-dim: #999;
            --border: rgba(0, 0, 0, 0.06);
            --border-strong: rgba(0, 0, 0, 0.1);
            --site-margin: clamp(2rem, 1.08% + 3.92vw, 5rem);
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ─── Subtle background texture ─── */
        .bg-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.025;
            pointer-events: none;
            z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px;
        }

        /* ─── Warm gradient wash ─── */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(217, 119, 87, 0.06) 0%, transparent 60%),
                        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(217, 119, 87, 0.03) 0%, transparent 50%);
        }

        /* ─── Layout ─── */
        .page-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ─── Nav ─── */
        nav {
            padding: 1.25rem var(--site-margin);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            background: var(--bg-nav);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
        }

        .logo-mark {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-mark svg {
            width: 100%;
            height: 100%;
        }

        .logo-wordmark {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .logo-wordmark span {
            font-weight: 400;
            color: var(--text-secondary);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-link {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--text);
        }

        /* ─── Hero ─── */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 6rem var(--site-margin) 8rem;
            min-height: calc(100vh - 60px);
        }

        .hero-eyebrow {
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        .hero h1 {
            font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 300;
            line-height: 1.15;
            letter-spacing: -0.02em;
            color: var(--text);
            max-width: 720px;
            margin-bottom: 2rem;
            animation: fadeIn 0.8s ease-out 0.1s both;
        }

        .hero h1 em {
            font-style: italic;
            color: var(--accent);
        }

        .hero-description {
            font-size: clamp(1rem, 2vw, 1.15rem);
            color: var(--text-secondary);
            max-width: 480px;
            line-height: 1.7;
            font-weight: 400;
            margin-bottom: 3.5rem;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        /* ─── Divider line ─── */
        .hero-divider {
            width: 48px;
            height: 1px;
            background: var(--accent);
            opacity: 0.4;
            margin-bottom: 3.5rem;
            animation: fadeIn 0.8s ease-out 0.3s both;
        }

        /* ─── Capability pills ─── */
        .capabilities {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .cap-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            border-radius: 100px;
            border: 1px solid var(--border-strong);
            background: white;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 450;
            transition: all 0.2s;
        }

        .cap-pill:hover {
            border-color: var(--accent-border);
            background: var(--accent-subtle);
            color: var(--accent);
        }

        .cap-pill svg {
            width: 14px;
            height: 14px;
            opacity: 0.5;
        }

        .cap-pill:hover svg {
            opacity: 0.8;
        }

        /* ─── Canvas ─── */
        #network-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ─── Footer ─── */
        footer {
            padding: 2rem var(--site-margin);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--accent);
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        /* ─── Animations ─── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── Responsive ─── */
        @media (max-width: 640px) {
            .hero { padding: 4rem 1.5rem 5rem; }
            .capabilities { gap: 0.5rem; }
            .cap-pill { font-size: 0.75rem; padding: 0.4rem 0.8rem; }
            footer { flex-direction: column; gap: 0.75rem; text-align: center; }
            .nav-right { gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-grain"></div>
    <div class="bg-gradient"></div>
    <canvas id="network-canvas"></canvas>

    <div class="page-wrapper">
        <nav>
            <a href="/" class="logo">
                <div class="logo-mark">
                    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="14" cy="6" r="2.5" fill="var(--accent)"/>
                        <circle cx="6" cy="22" r="2.5" fill="var(--text)" opacity="0.25"/>
                        <circle cx="22" cy="22" r="2.5" fill="var(--text)" opacity="0.25"/>
                        <circle cx="14" cy="15" r="2" fill="none" stroke="var(--accent)" stroke-width="1.2" opacity="0.5"/>
                        <line x1="14" y1="8.5" x2="14" y2="13" stroke="var(--accent)" stroke-width="0.8" opacity="0.3"/>
                        <line x1="8.2" y1="20.5" x2="12" y2="16.2" stroke="var(--text)" stroke-width="0.8" opacity="0.15"/>
                        <line x1="19.8" y1="20.5" x2="16" y2="16.2" stroke="var(--text)" stroke-width="0.8" opacity="0.15"/>
                    </svg>
                </div>
                <div class="logo-wordmark">myrt<span>labs</span></div>
            </a>
            <div class="nav-right">
                <a href="mailto:prashanth.gangu@gmail.com" class="nav-link">Contact</a>
            </div>
        </nav>

        <section class="hero">
            <p class="hero-eyebrow">AI Agent Studio</p>

            <h1>Autonomous agents<br>that <em>reason</em> and act</h1>

            <p class="hero-description">
                We build AI systems that think through complexity, orchestrate tools, and deliver real outcomes — autonomously.
            </p>

            <div class="hero-divider"></div>

            <div class="capabilities">
                <div class="cap-pill">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    Multi-agent systems
                </div>
                <div class="cap-pill">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    Autonomous execution
                </div>
                <div class="cap-pill">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
                    Tool-augmented reasoning
                </div>
            </div>
        </section>

        <footer>
            <span>&copy; 2026 Myrt Labs</span>
            <div class="footer-right">
                <a href="mailto:prashanth.gangu@gmail.com">prashanth.gangu@gmail.com</a>
            </div>
        </footer>
    </div>

    <script>
        // ─── Subtle network animation (very faint on light bg) ───
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        let nodes = [];
        let mouse = { x: null, y: null };
        const NODE_COUNT = 40;
        const CONNECT_DIST = 160;
        const MOUSE_DIST = 180;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        class Node {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.25;
                this.vy = (Math.random() - 0.5) * 0.25;
                this.radius = Math.random() * 1.2 + 0.4;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
                ctx.fill();
            }
        }

        for (let i = 0; i < NODE_COUNT; i++) {
            nodes.push(new Node());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < nodes.length; i++) {
                nodes[i].update();
                nodes[i].draw();

                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < CONNECT_DIST) {
                        const opacity = (1 - dist / CONNECT_DIST) * 0.04;
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.strokeStyle = `rgba(0, 0, 0, ${opacity})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }

                // Mouse interaction — warm accent lines
                if (mouse.x !== null) {
                    const dx = nodes[i].x - mouse.x;
                    const dy = nodes[i].y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < MOUSE_DIST) {
                        const opacity = (1 - dist / MOUSE_DIST) * 0.12;
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.strokeStyle = `rgba(217, 119, 87, ${opacity})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
